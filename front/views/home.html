<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div id="container">
        <div id="titleBox">
            <h1><a href="/">나의 건강한 체중관리</a></h1>
        </div>

        <ul>
            <li id="box1"><a href="/bmi">BMI 확인하기</a></li>
            <li id="box2"><a href="/food">식단관리</a></li>
            <li id="box1"><a href="/fitness">운동루틴</a></li>
        </ul>
        
        <div id="slidebox">
            <div id="slideIn">
                <img src="/images/weight.png" alt="">
                <img src="/images/food.png" alt="">
                <img src="/images/run.png" alt="">
                <span id="slideText">평균 체중표</span>
            </div>
        </div>

        <div id="serviceIntro">
            <div class="introBox">
                <div class="icon">🔍</div>
                <h3>신체 정보 분석</h3>
                <p>키와 몸무게를 입력하면 <strong>LLM</strong>이 현재 당신의 상태를 <br>정밀 분석하여 건강한 목표 체중을 제안합니다.</p>
            </div>
            <div class="introBox">
                <div class="icon">🥗</div>
                <h3>AI 맞춤 식단</h3>
                <p>감량, 벌크업 등 당신의 목표에 맞춰 <strong>LLM</strong>이 영양 균형이 잡힌 1:1 식단을 구성해 드립니다.</p>
            </div>
            <div class="introBox">
                <div class="icon">💪</div>
                <h3>운동 루틴 설계</h3>
                <p>어렵게 고민하지 마세요. 당신의 신체 조건에 딱 맞는 <br><strong>최적의 운동 프로그램</strong>을 바로 알려드립니다.</p>
            </div>
        </div>

    </div>
